<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" aria-label="늑구런 앱 아이콘">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#e0561a"/>
    </linearGradient>
    <radialGradient id="faceShade" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#e8d6a8"/>
      <stop offset="100%" stop-color="#b8996a"/>
    </radialGradient>
  </defs>

  <!-- rounded-square background -->
  <rect width="512" height="512" rx="110" fill="url(#iconBg)"/>

  <!-- soft spotlight behind head -->
  <circle cx="256" cy="260" r="210" fill="rgba(255,240,200,0.18)"/>

  <!-- ears: outer dark, inner pink -->
  <g>
    <path d="M120 200 L150 70 L230 180 Z" fill="#5a4530"/>
    <path d="M392 200 L362 70 L282 180 Z" fill="#5a4530"/>
    <path d="M140 190 L160 100 L210 180 Z" fill="#c9a077"/>
    <path d="M372 190 L352 100 L302 180 Z" fill="#c9a077"/>
    <path d="M160 180 L172 124 L196 176 Z" fill="#f2b8a0"/>
    <path d="M352 180 L340 124 L316 176 Z" fill="#f2b8a0"/>
  </g>

  <!-- head base -->
  <ellipse cx="256" cy="280" rx="170" ry="160" fill="url(#faceShade)"/>

  <!-- darker crown saddle -->
  <path d="M96 240 Q256 130 416 240 Q410 280 256 260 Q102 280 96 240"
        fill="#7a5f3c"/>

  <!-- cream face mask -->
  <ellipse cx="256" cy="300" rx="130" ry="130" fill="#f3e6c2"/>

  <!-- cheek tufts -->
  <path d="M104 300 Q76 352 116 376 Q156 370 156 324 Z" fill="#e8d4a8"/>
  <path d="M408 300 Q436 352 396 376 Q356 370 356 324 Z" fill="#e8d4a8"/>

  <!-- muzzle -->
  <ellipse cx="256" cy="356" rx="76" ry="68" fill="#fbf1d4"/>

  <!-- blush -->
  <ellipse cx="158" cy="340" rx="22" ry="14" fill="#ff9a9a" opacity="0.55"/>
  <ellipse cx="354" cy="340" rx="22" ry="14" fill="#ff9a9a" opacity="0.55"/>

  <!-- eyes: big round amber -->
  <g>
    <ellipse cx="190" cy="298" rx="28" ry="32" fill="#ffffff"/>
    <ellipse cx="322" cy="298" rx="28" ry="32" fill="#ffffff"/>
    <ellipse cx="190" cy="304" rx="22" ry="26" fill="#e69b1e"/>
    <ellipse cx="322" cy="304" rx="22" ry="26" fill="#e69b1e"/>
    <ellipse cx="190" cy="308" rx="11" ry="18" fill="#141005"/>
    <ellipse cx="322" cy="308" rx="11" ry="18" fill="#141005"/>
    <circle cx="198" cy="294" r="6" fill="#ffffff"/>
    <circle cx="330" cy="294" r="6" fill="#ffffff"/>
    <circle cx="184" cy="314" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="316" cy="314" r="3" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- brows -->
  <path d="M152 264 Q190 250 218 272" stroke="#3a2a18" stroke-width="9"
        fill="none" stroke-linecap="round"/>
  <path d="M294 272 Q322 250 360 264" stroke="#3a2a18" stroke-width="9"
        fill="none" stroke-linecap="round"/>

  <!-- nose (heart-ish) -->
  <path d="M234 344 Q256 330 278 344 Q278 368 256 374 Q234 368 234 344 Z"
        fill="#1a1a1a"/>

  <!-- mouth + tongue (happy) -->
  <path d="M256 374 Q256 398 236 402" stroke="#1a1a1a" stroke-width="6"
        fill="none" stroke-linecap="round"/>
  <path d="M256 374 Q256 398 276 402" stroke="#1a1a1a" stroke-width="6"
        fill="none" stroke-linecap="round"/>
  <path d="M248 394 Q256 410 264 394 Q264 404 256 408 Q248 404 248 394 Z"
        fill="#ff6f8a"/>

  <!-- chin cream -->
  <ellipse cx="256" cy="410" rx="30" ry="10" fill="#fff4d8"/>
</svg>
