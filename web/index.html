<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0d141f" />
<title>늑구런 — Neukgu Run</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="stage">
    <canvas id="game" width="720" height="1280"></canvas>
    <div id="hud">
      <div id="score">점수 0</div>
      <div id="best">최고 0</div>
    </div>
    <div id="start-overlay" class="overlay">
      <h1>늑구런</h1>
      <p class="tag">대전 오월드 탈출 10일간의 질주</p>
      <p class="hint">화면을 손가락으로 쓸어서 늑구를 좌우로 조종 · 사육사·그물을 피해 계속 북쪽으로!</p>
      <button id="start-btn">탈출 시작!</button>
    </div>
    <div id="over-overlay" class="overlay hidden">
      <h2 id="over-title">잡혔다!</h2>
      <p id="over-sub" class="hint hidden"></p>
      <p id="final-score">점수 0</p>
      <p id="final-best">최고 0</p>
      <button id="restart-btn">다시 탈출!</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
