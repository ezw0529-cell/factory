name: Build Android APK

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
  workflow_dispatch:

env:
  GODOT_VERSION: 4.3
  GODOT_STATUS: stable
  EXPORT_NAME: neukgu-run

jobs:
  export-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Install matching Android build-tools and platform
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Download Godot
        run: |
          GODOT_ZIP="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/${GODOT_ZIP}"
          unzip -q "${GODOT_ZIP}"
          sudo mv "Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Download Godot export templates
        run: |
          TPZ="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/${TPZ}"
          TEMPLATE_DIR="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          mkdir -p "${TEMPLATE_DIR}"
          unzip -q "${TPZ}"
          mv templates/* "${TEMPLATE_DIR}/"
          rmdir templates
          echo "--- template dir contents ---"
          ls -la "${TEMPLATE_DIR}/" | head -30
          echo "--- android templates present? ---"
          ls -la "${TEMPLATE_DIR}/android_debug.apk" "${TEMPLATE_DIR}/android_release.apk" \
                 "${TEMPLATE_DIR}/android_source.zip" 2>&1 || true

      - name: Generate debug keystore
        id: keystore
        run: |
          KEYSTORE_PATH="${GITHUB_WORKSPACE}/debug.keystore"
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore "${KEYSTORE_PATH}" \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -validity 9999 -deststoretype pkcs12
          keytool -list -keystore "${KEYSTORE_PATH}" -storepass android | head -20
          echo "path=${KEYSTORE_PATH}" >> "$GITHUB_OUTPUT"

      - name: Write Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          SETTINGS_FILE="${HOME}/.config/godot/editor_settings-4.tres"
          cat > "$SETTINGS_FILE" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/debug_keystore = "${{ steps.keystore.outputs.path }}"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/force_system_user = false
          export/android/shutdown_adb_on_exit = true
          export/android/one_click_deploy_clear_previous_install = false
          EOF
          echo "--- editor_settings-4.tres ---"
          cat "$SETTINGS_FILE"
          echo "--- env ---"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          java -version 2>&1
          echo "--- javac present? ---"
          ls -la "$JAVA_HOME/bin/javac"
          echo "--- android sdk layout ---"
          ls -la "$ANDROID_HOME/build-tools/"
          ls -la "$ANDROID_HOME/platforms/"
          ls -la "$ANDROID_HOME/platform-tools/" | head -5

      - name: Import project (populate .godot cache)
        run: |
          godot --headless --import 2>&1 | tee import.log || true
          godot --headless --import 2>&1 | tee -a import.log || true
          echo "--- .godot dir ---"
          ls -la .godot/ 2>&1 || echo "(.godot not created)"
          echo "--- script parse errors (if any) ---"
          grep -E "SCRIPT ERROR|Parse Error|Failed to load" import.log || echo "(no parse errors)"

      - name: Re-assert editor settings after import
        run: |
          SETTINGS_FILE="${HOME}/.config/godot/editor_settings-4.tres"
          cat > "$SETTINGS_FILE" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/debug_keystore = "${{ steps.keystore.outputs.path }}"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF
          echo "--- re-asserted settings ---"
          cat "$SETTINGS_FILE"

      - name: Build Android APK (debug)
        run: |
          mkdir -p build/android
          godot --headless --verbose --export-debug "Android" \
            "${GITHUB_WORKSPACE}/build/android/${EXPORT_NAME}.apk" 2>&1 \
            | tee export.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "--- export exit code: $EXIT_CODE ---"
          echo "--- any lines between 'configuration errors:' and the 'at:' line ---"
          awk '/configuration errors:/{flag=1; next} /^   at:/{flag=0} flag' export.log || true
          exit $EXIT_CODE

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-apk
          path: build/android/${{ env.EXPORT_NAME }}.apk
          if-no-files-found: error
