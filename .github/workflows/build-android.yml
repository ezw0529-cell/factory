name: Build Android APK

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
  workflow_dispatch:

env:
  GODOT_VERSION: 4.4
  GODOT_STATUS: stable
  EXPORT_NAME: neukgu-run

jobs:
  export-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Install matching Android build-tools and platform
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Download Godot
        run: |
          GODOT_ZIP="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/${GODOT_ZIP}"
          unzip -q "${GODOT_ZIP}"
          sudo mv "Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Download Godot export templates
        run: |
          TPZ="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/${TPZ}"
          TEMPLATE_DIR="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          mkdir -p "${TEMPLATE_DIR}"
          unzip -q "${TPZ}"
          mv templates/* "${TEMPLATE_DIR}/"
          rmdir templates
          echo "::group::template dir contents"
          ls -la "${TEMPLATE_DIR}/"
          echo "::endgroup::"
          echo "::group::android templates present?"
          for f in android_debug.apk android_release.apk android_source.zip; do
            if [ -f "${TEMPLATE_DIR}/${f}" ]; then
              echo "OK: ${f} ($(stat -c%s "${TEMPLATE_DIR}/${f}") bytes)"
            else
              echo "MISSING: ${f}"
            fi
          done
          echo "::endgroup::"

      - name: Generate debug keystore
        id: keystore
        run: |
          KEYSTORE_PATH="${GITHUB_WORKSPACE}/debug.keystore"
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore "${KEYSTORE_PATH}" \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -validity 9999 -deststoretype pkcs12
          echo "path=${KEYSTORE_PATH}" >> "$GITHUB_OUTPUT"

      - name: Write Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/debug_keystore = "${{ steps.keystore.outputs.path }}"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF
          echo "::group::editor_settings-4.tres"
          cat ~/.config/godot/editor_settings-4.tres
          echo "::endgroup::"
          echo "::group::env"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          java -version 2>&1
          ls -la "$JAVA_HOME/bin/javac"
          echo "::endgroup::"
          echo "::group::android SDK layout"
          ls "$ANDROID_HOME/build-tools/"
          ls "$ANDROID_HOME/platforms/"
          echo "::endgroup::"
          echo "::group::project.godot"
          cat project.godot
          echo "::endgroup::"
          echo "::group::export_presets.cfg (head)"
          head -60 export_presets.cfg
          echo "::endgroup::"

      - name: Import project (headless, twice, strict)
        run: |
          set +e
          echo "::group::import run 1"
          godot --headless --path "${GITHUB_WORKSPACE}" --import 2>&1 | tee import1.log
          RC1=${PIPESTATUS[0]}
          echo "(exit $RC1)"
          echo "::endgroup::"
          echo "::group::import run 2"
          godot --headless --path "${GITHUB_WORKSPACE}" --import 2>&1 | tee import2.log
          RC2=${PIPESTATUS[0]}
          echo "(exit $RC2)"
          echo "::endgroup::"
          echo "::group::.godot dir after import"
          ls -la .godot/ 2>&1 || echo "(.godot missing)"
          find .godot -type f | head -30 || true
          echo "::endgroup::"
          echo "::group::script / parse errors in import logs"
          grep -E "SCRIPT ERROR|Parse Error|Failed to load|^ERROR" import1.log import2.log || echo "(none)"
          echo "::endgroup::"
          if [ ! -d .godot ]; then
            echo "::error::Import did not produce a .godot cache directory. Project failed to import cleanly."
            exit 1
          fi

      - name: Re-assert editor settings after import
        run: |
          cat > ~/.config/godot/editor_settings-4.tres <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/debug_keystore = "${{ steps.keystore.outputs.path }}"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Build Android APK (debug)
        run: |
          mkdir -p build/android
          set +e
          godot --headless --path "${GITHUB_WORKSPACE}" --verbose \
            --export-debug "Android" \
            "${GITHUB_WORKSPACE}/build/android/${EXPORT_NAME}.apk" 2>&1 \
            | tee export.log
          EXIT=${PIPESTATUS[0]}
          echo "::group::export exit code"
          echo "$EXIT"
          echo "::endgroup::"
          echo "::group::full export.log"
          cat export.log
          echo "::endgroup::"
          exit $EXIT

      - name: Always upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            import1.log
            import2.log
            export.log
          if-no-files-found: ignore

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-apk
          path: build/android/${{ env.EXPORT_NAME }}.apk
          if-no-files-found: error
