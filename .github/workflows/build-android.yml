name: Build Android APK

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
  workflow_dispatch:

env:
  GODOT_VERSION: 4.3
  GODOT_STATUS: stable
  EXPORT_NAME: neukgu-run

jobs:
  export-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Install matching Android build-tools and platform
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Install xvfb and runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libfontconfig1 libxcursor1 libxinerama1 \
            libxi6 libxrandr2 libasound2 libpulse0

      - name: Download Godot
        run: |
          GODOT_ZIP="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/${GODOT_ZIP}"
          unzip -q "${GODOT_ZIP}"
          sudo mv "Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Download Godot export templates
        run: |
          TPZ="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/${TPZ}"
          TEMPLATE_DIR="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          mkdir -p "${TEMPLATE_DIR}"
          unzip -q "${TPZ}"
          mv templates/* "${TEMPLATE_DIR}/"
          rmdir templates
          echo "--- template dir ---"
          ls -la "${TEMPLATE_DIR}/" | grep -E "android|version" || true

      - name: Generate debug keystore
        id: keystore
        run: |
          KEYSTORE_PATH="${GITHUB_WORKSPACE}/debug.keystore"
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore "${KEYSTORE_PATH}" \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -validity 9999 -deststoretype pkcs12
          echo "path=${KEYSTORE_PATH}" >> "$GITHUB_OUTPUT"

      - name: Write Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/debug_keystore = "${{ steps.keystore.outputs.path }}"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/force_system_user = false
          export/android/shutdown_adb_on_exit = true
          EOF
          echo "--- editor_settings-4.tres ---"
          cat ~/.config/godot/editor_settings-4.tres
          echo "--- Android SDK layout ---"
          ls "$ANDROID_HOME/build-tools/"
          ls "$ANDROID_HOME/platforms/"

      - name: Initialize Godot editor via xvfb (full plugin init)
        run: |
          # Running the full editor with xvfb ensures every export plugin
          # (Android, etc.) registers its properties and resolves paths.
          # --quit-after is in frames: 300 ~= 5 seconds at 60 FPS.
          set +e
          xvfb-run -a --server-args="-screen 0 1280x720x24" \
            godot --editor --verbose --quit-after 400 2>&1 \
            | tee editor-init.log
          EXIT=$?
          echo "--- editor init exit code: $EXIT ---"
          echo "--- .godot cache dir ---"
          ls -la .godot/ 2>&1 || echo "(.godot NOT created — project failed to import)"
          echo "--- script errors in init log ---"
          grep -E "SCRIPT ERROR|Parse Error|Failed to load" editor-init.log || echo "(none)"
          echo "--- any error lines in init log ---"
          grep -E "^ERROR|^WARNING" editor-init.log | head -40 || true

      - name: Re-assert editor settings after init
        run: |
          # xvfb init may have rewritten our settings — put them back.
          cat > ~/.config/godot/editor_settings-4.tres <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/debug_keystore = "${{ steps.keystore.outputs.path }}"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF
          echo "--- re-asserted editor settings ---"
          cat ~/.config/godot/editor_settings-4.tres

      - name: Build Android APK (debug, via xvfb)
        run: |
          mkdir -p build/android
          set +e
          xvfb-run -a --server-args="-screen 0 1280x720x24" \
            godot --verbose --export-debug "Android" \
            "${GITHUB_WORKSPACE}/build/android/${EXPORT_NAME}.apk" 2>&1 \
            | tee export.log
          EXIT=${PIPESTATUS[0]}
          echo "--- export exit code: $EXIT ---"
          echo "--- error context (30 lines around any ERROR) ---"
          grep -n -B2 -A10 "ERROR\|error:\|required" export.log | head -100 || true
          exit $EXIT

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-apk
          path: build/android/${{ env.EXPORT_NAME }}.apk
          if-no-files-found: error

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            editor-init.log
            export.log
          if-no-files-found: ignore
