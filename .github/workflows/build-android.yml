name: Build Android APK

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
  workflow_dispatch:

env:
  GODOT_VERSION: 4.3
  EXPORT_NAME: neukgu-run

jobs:
  export-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/ || true

      - name: Generate debug keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore debug.keystore \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -validity 9999 -deststoretype pkcs12

      - name: Configure Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME:-/usr/lib/android-sdk}"
          export/android/debug_keystore = "$(pwd)/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Import project (priming)
        continue-on-error: true
        run: |
          godot --headless --import || true

      - name: Build Android APK (debug)
        run: |
          mkdir -p build/android
          godot --headless --export-debug "Android" ./build/android/${EXPORT_NAME}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-apk
          path: build/android/${{ env.EXPORT_NAME }}.apk
          if-no-files-found: error
