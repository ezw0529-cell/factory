name: Build Android APK

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
  workflow_dispatch:

env:
  GODOT_VERSION: 4.3
  GODOT_STATUS: stable
  EXPORT_NAME: neukgu-run

jobs:
  export-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Install matching Android build-tools and platform
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Download Godot
        run: |
          GODOT_ZIP="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/${GODOT_ZIP}"
          unzip -q "${GODOT_ZIP}"
          sudo mv "Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Download Godot export templates
        run: |
          TPZ="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/${TPZ}"
          TEMPLATE_DIR="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          mkdir -p "${TEMPLATE_DIR}"
          unzip -q "${TPZ}"
          mv templates/* "${TEMPLATE_DIR}/"
          rmdir templates
          echo "--- template dir contents ---"
          ls -la "${TEMPLATE_DIR}/"
          echo "--- android templates present? ---"
          ls -la "${TEMPLATE_DIR}/android_debug.apk" "${TEMPLATE_DIR}/android_release.apk" \
                 "${TEMPLATE_DIR}/android_source.zip" 2>&1 || true

      - name: Generate debug keystore
        id: keystore
        run: |
          KEYSTORE_PATH="${GITHUB_WORKSPACE}/debug.keystore"
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore "${KEYSTORE_PATH}" \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -validity 9999 -deststoretype pkcs12
          ls -la "${KEYSTORE_PATH}"
          echo "path=${KEYSTORE_PATH}" >> "$GITHUB_OUTPUT"

      - name: Import project (populates .godot cache + default editor settings)
        run: |
          mkdir -p ~/.config/godot
          godot --headless --import 2>&1 || true
          godot --headless --import 2>&1 || true
          echo "--- .godot dir ---"
          ls -la .godot/ 2>&1 || echo ".godot directory missing!"
          echo "--- editor_settings file listing ---"
          ls -la ~/.config/godot/ 2>&1 || true

      - name: Write Android editor settings (overwrite after import)
        run: |
          SETTINGS_FILE=""
          for candidate in \
            ~/.config/godot/editor_settings-4.tres \
            ~/.config/godot/editor_settings-4.4.tres \
            ~/.config/godot/editor_settings-4.3.tres; do
            if [ -f "$candidate" ]; then
              SETTINGS_FILE="$candidate"
              echo "Found existing settings file: $candidate"
              break
            fi
          done
          if [ -z "$SETTINGS_FILE" ]; then
            SETTINGS_FILE="${HOME}/.config/godot/editor_settings-4.tres"
            echo "No settings file found, creating: $SETTINGS_FILE"
          fi

          cat > "$SETTINGS_FILE" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/debug_keystore = "${{ steps.keystore.outputs.path }}"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/force_system_user = false
          export/android/shutdown_adb_on_exit = true
          export/android/one_click_deploy_clear_previous_install = false
          EOF

          echo "--- final editor settings ---"
          cat "$SETTINGS_FILE"
          echo "--- environment ---"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          java -version
          echo "--- javac present? ---"
          ls -la "$JAVA_HOME/bin/javac" 2>&1 || true
          echo "--- keystore present? ---"
          ls -la "${{ steps.keystore.outputs.path }}" 2>&1 || true
          echo "--- android sdk dirs ---"
          ls -la "$ANDROID_HOME/build-tools/" 2>&1 || true
          ls -la "$ANDROID_HOME/platforms/" 2>&1 || true
          ls -la "$ANDROID_HOME/platform-tools/" 2>&1 || true

      - name: Dump preset config before export
        run: |
          echo "--- export_presets.cfg (head) ---"
          head -80 export_presets.cfg
          echo "--- project.godot ---"
          cat project.godot

      - name: Diagnose export config via editor script
        run: |
          cat > diagnose_export.gd <<'GDSCRIPT'
          @tool
          extends EditorScript

          func _run() -> void:
              print("=== EXPORT DIAGNOSIS ===")
              var ee := EditorExport.get_singleton()
              print("Preset count: ", ee.get_export_preset_count())
              for i in range(ee.get_export_preset_count()):
                  var p := ee.get_export_preset(i)
                  print("Preset[%d]: name=%s platform=%s" % [i, p.get_name(), p.get_platform().get_name()])
                  var err_list := PackedStringArray()
                  var missing := PackedStringArray()
                  var ok := p.get_platform().can_export(p, err_list, missing)
                  print("  can_export(): ", ok)
                  for e in err_list:
                      print("  CONFIG ERROR: ", e)
                  for m in missing:
                      print("  MISSING TEMPLATE: ", m)
              print("=== END DIAGNOSIS ===")
          GDSCRIPT
          godot --headless --script diagnose_export.gd 2>&1 || true

      - name: Build Android APK (debug)
        run: |
          mkdir -p build/android
          godot --headless --verbose --export-debug "Android" "${GITHUB_WORKSPACE}/build/android/${EXPORT_NAME}.apk" 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-apk
          path: build/android/${{ env.EXPORT_NAME }}.apk
          if-no-files-found: error
